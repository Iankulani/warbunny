# WARBUNNY Kubernetes Services
apiVersion: v1
kind: Service
metadata:
  name: warbunny
  namespace: security
  labels:
    app: warbunny
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: web
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: phishing
  selector:
    app: warbunny
---
apiVersion: v1
kind: Service
metadata:
  name: warbunny-external
  namespace: security
  labels:
    app: warbunny
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 5000
    protocol: TCP
    name: https
  selector:
    app: warbunny
---
apiVersion: v1
kind: Service
metadata:
  name: warbunny-headless
  namespace: security
  labels:
    app: warbunny
spec:
  clusterIP: None
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: warbunny
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warbunny-ingress
  namespace: security
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - warbunny.example.com
    secretName: warbunny-tls
  rules:
  - host: warbunny.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: warbunny
            port:
              number: 5000