# WARBUNNY Kubernetes Secret
# IMPORTANT: Use kubectl create secret instead of storing raw secrets
apiVersion: v1
kind: Secret
metadata:
  name: warbunny-secret
  namespace: security
  labels:
    app: warbunny
type: Opaque
stringData:
  # Database credentials
  db_password: "CHANGE_ME_SECURE_PASSWORD"
  db_user: "warbunny"
  
  # Bot tokens (replace with actual tokens)
  discord_token: "DISCORD_BOT_TOKEN"
  slack_token: "SLACK_BOT_TOKEN"
  telegram_token: "TELEGRAM_BOT_TOKEN"
  slack_app_token: "SLACK_APP_TOKEN"
  
  # API Keys
  google_api_key: "GOOGLE_API_KEY"
  
  # Admin credentials
  admin_password_hash: ""  # Will be generated on first run
  
  # Encryption keys
  fernet_key: ""  # Will be generated on first run
---
# External Secret (using External Secrets Operator)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: warbunny-external-secret
  namespace: security
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: warbunny-secret
    creationPolicy: Owner
  data:
  - secretKey: db_password
    remoteRef:
      key: warbunny/production/db_password
  - secretKey: discord_token
    remoteRef:
      key: warbunny/production/discord_token
  - secretKey: slack_token
    remoteRef:
      key: warbunny/production/slack_token